<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar glass">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="telegram-icon">
        <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Telegram Gallery</span>
    </div>
    <div class="search-container">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" class="search-input glass" placeholder="Search captions..." />
    </div>
    <div class="actions">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle Theme">
        <svg fill="currentColor" viewBox="0 0 20 20" class="icon" id="theme-icon"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
      </button>
    </div>
  </header>

  <main class="container">
    <div class="tabs glass">
      <button class="tab active" data-filter="all">All Media</button>
      <button class="tab" data-filter="photo">Photos</button>
      <button class="tab" data-filter="video">Videos</button>
      <button class="tab" data-filter="document">Documents</button>
    </div>

    <!-- Header area for dynamic category actions (e.g. Delete Folder) -->
    <div id="gallery-header" style="margin-bottom: 24px;"></div>

    <!-- Masonry CSS Layout Grid -->
    <div class="gallery-grid" id="gallery">
      <!-- Media Items will be injected here via JS -->
    </div>
    
    <div id="loading" class="loading-state hidden">
      <div class="spinner"></div>
      <p>Loading more media...</p>
    </div>
    
    <div id="empty-state" class="empty-state hidden">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
      <h2>No media found</h2>
      <p>Send an image, video, or file to the Telegram group to view it here.</p>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox-overlay"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close">&times;</button>
      <div id="lightbox-media-container"></div>
      <div class="lightbox-caption" id="lightbox-caption"></div>
      <a id="lightbox-download" class="btn primary-btn" download>Download</a>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
